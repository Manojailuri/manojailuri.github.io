  window.addEventListener("deviceorientation", (event) => {
  // Tilt left/right
  const gx = event.gamma || 0;

  // Tilt forward/back
  const gy = event.beta || 0;

  // Convert orientation to gravity
console.log("x: ", gx, " y: ", gy);


    const valx = document.getElementById("valuex");
    valx.textContent = gx;
